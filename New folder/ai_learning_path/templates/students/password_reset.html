{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - AI LearnPath{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto; padding: 0 1rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fa-solid fa-key" style="font-size: 3rem; margin-bottom: 1rem; color: var(--accent-pink);"></i>
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Reset Password</h1>
        <p style="color: var(--text-secondary);">Enter your email address to receive recovery instructions</p>
    </div>
    
    <div class="glass-panel widget-card" style="padding: 2.5rem;">
        <form method="post" novalidate>
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input type="email" id="id_email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1.5rem;">
                <i class="fa-solid fa-envelope"></i> Send Recovery Link
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
            Remembered your credentials? <a href="{% url 'login' %}" style="font-weight: 600;">Log In here</a>
        </div>
    </div>
</div>
{% endblock %}
