{% extends 'base.html' %}
{% load static %}

{% block title %}Contact Us - AI Learning Path Generator{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 2rem 0;">
    <div class="page-header">
        <div>
            <h1 class="page-title">Contact Support</h1>
            <p class="page-subtitle">Get in touch with our learning pathway mentors</p>
        </div>
    </div>
    
    <div class="glass-panel widget-card" style="padding: 2.5rem;">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" class="form-control" placeholder="What is this inquiry about?" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="form-control" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fa-solid fa-paper-plane"></i> Send Message
            </button>
        </form>
    </div>
</div>
{% endblock %}
