{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Complete - AI LearnPath{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto; padding: 0 1rem; text-align: center;">
    <div class="glass-panel widget-card" style="padding: 3rem 2rem;">
        <i class="fa-solid fa-circle-check" style="font-size: 3.5rem; color: var(--success); margin-bottom: 1.5rem;"></i>
        <h1 style="font-size: 1.8rem; margin-bottom: 1rem;">Password Reset Completed</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem;">
            Your password has been changed successfully. You can now log in using your new credentials.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%; justify-content: center;">
            <i class="fa-solid fa-right-to-bracket"></i> Proceed to Login
        </a>
    </div>
</div>
{% endblock %}
